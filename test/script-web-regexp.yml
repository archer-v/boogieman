script:
  - name: web-body-regex-match
    cgroup: 1
    probe:
      name: web
      options:
        timeout: 5000
      configuration:
        urls:
          # base64 encoded: boogieman version=1.2.3 status=ok
          - https://httpbin.org/base64/Ym9vZ2llbWFuIHZlcnNpb249MS4yLjMgc3RhdHVzPW9rCg==
        httpStatus: 200
        regex: "status=ok"

  - name: web-body-regex-invert
    cgroup: 1
    probe:
      name: web
      options:
        timeout: 5000
      configuration:
        urls:
          - https://httpbin.org/base64/Ym9vZ2llbWFuIHZlcnNpb249MS4yLjMgc3RhdHVzPW9rCg==
        httpStatus: 200
        regex: "status=failed"
        regexInvert: true

  - name: web-body-regex-capture-version
    cgroup: 1
    probe:
      name: web
      options:
        timeout: 5000
      configuration:
        urls:
          - https://httpbin.org/base64/Ym9vZ2llbWFuIHZlcnNpb249MS4yLjMgc3RhdHVzPW9rCg==
        regex: "version=([0-9]+\\.[0-9]+\\.[0-9]+)"
        regexCaptureGroup: 1
        captureRegex: "^1\\.2\\."
    metric:
      labels:
        label1: testvalue1
